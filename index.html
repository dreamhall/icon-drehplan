<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICON Season Dos - Drehplan Madrid</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

:root{
  --bg:#050505;--sf:#0c0c0c;--s2:#111;--s3:#181818;--s4:#222;
  --bd:#252525;--bdh:#333;--tx:#f0f0f0;--dm:#888;--ft:#555;
  --gold:#ffd23f;--goldbg:rgba(255,210,63,.05);--goldb:rgba(255,210,63,.18);
  --red:#ff4444;--blue:#4488ff;--green:#44cc66;--orange:#ff8833;--purple:#aa66ff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;line-height:1.6}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

/* ─── HEADER ─── */
.hdr{padding:28px 36px 20px;border-bottom:1px solid var(--bd);background:linear-gradient(180deg,rgba(255,210,63,.025) 0%,transparent 100%);position:relative}
.hdr::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.hdr-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:12px}
.logo-ic{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--orange));display:flex;align-items:center;justify-content:center;font-family:'Oswald';font-weight:700;font-size:16px;color:#050505}
.logo h1{font-family:'Oswald';font-weight:700;font-size:1.5rem;letter-spacing:2px;text-transform:uppercase}
.logo h1 b{color:var(--gold)}
.logo .sub{font-size:.65rem;color:var(--dm);letter-spacing:1px;margin-top:1px}
.lang-bar{display:flex;gap:4px}
.lbtn{padding:4px 11px;border:1px solid var(--bd);background:transparent;color:var(--dm);border-radius:5px;cursor:pointer;font-size:.65rem;font-weight:600;font-family:'Montserrat';transition:all .15s}
.lbtn:hover{border-color:var(--gold);color:var(--tx)}
.lbtn.on{background:var(--gold);color:#050505;border-color:var(--gold)}

/* ─── VISION ─── */
.vision{padding:32px 36px;border-bottom:1px solid var(--bd);background:var(--sf)}
.vis-grid{display:grid;grid-template-columns:1fr 320px;gap:32px;align-items:start}
.vis-title{font-family:'Oswald';font-size:1.1rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.vis-text{font-size:.78rem;color:var(--dm);line-height:1.8}
.vis-text p{margin-bottom:10px}
.vis-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.vis-stat{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:14px 16px;text-align:center}
.vis-stat .n{font-family:'Oswald';font-size:1.4rem;font-weight:700;color:var(--gold)}
.vis-stat .l{font-size:.58rem;color:var(--ft);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* ─── MAIN ─── */
.main{max-width:1200px;margin:0 auto;padding:28px 36px 80px}

/* ─── INFO BAR ─── */
.ibar{display:flex;gap:8px;margin-bottom:32px;flex-wrap:wrap}
.icard{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:12px 16px;flex:1;min-width:120px}
.icard .l{font-size:.55rem;color:var(--ft);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.icard .v{font-family:'Oswald';font-size:.95rem;font-weight:500;margin-top:2px}
.icard .v.g{color:var(--gold)}

/* ─── SECTION ─── */
.sec{margin-bottom:36px}
.sec-hd{display:flex;align-items:center;gap:10px;padding:10px 0 14px;cursor:pointer;user-select:none;border-bottom:1px solid var(--bd);margin-bottom:16px}
.sec-hd h2{font-family:'Oswald';font-size:1rem;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.badge{font-size:.55rem;padding:2px 9px;border-radius:20px;font-weight:600;letter-spacing:.4px}
.bg{background:var(--goldbg);color:var(--gold);border:1px solid var(--goldb)}
.bb{background:rgba(68,136,255,.06);color:var(--blue);border:1px solid rgba(68,136,255,.18)}
.bo{background:rgba(255,136,51,.06);color:var(--orange);border:1px solid rgba(255,136,51,.18)}
.tgl{margin-left:auto;color:var(--dm);font-size:.7rem;transition:transform .2s}
.sec.shut .tgl{transform:rotate(-90deg)}
.sec.shut .sec-bd{display:none}

/* ─── TIMELINE ─── */
.tl{display:flex;flex-direction:column;gap:0}
.tl-row{display:grid;grid-template-columns:100px 1fr;border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s}
.tl-row:last-child{border-bottom:none}
.tl-row:hover{background:rgba(255,255,255,.012)}
.tl-row.perf{background:rgba(255,210,63,.015);border-left:3px solid var(--gold)}
.tl-row.brk{background:rgba(255,255,255,.008)}

.tl-t{padding:20px 14px;display:flex;flex-direction:column;justify-content:flex-start;align-items:flex-end;border-right:2px solid var(--bd);position:relative}
.tl-t::after{content:'';position:absolute;right:-6px;top:24px;width:10px;height:10px;border-radius:50%;background:var(--s3);border:2px solid var(--ft)}
.tl-row.perf .tl-t::after{background:var(--gold);border-color:var(--gold);box-shadow:0 0 10px rgba(255,210,63,.3)}
.tl-row.brk .tl-t::after{background:var(--s3);border-color:var(--bd)}

.tl-h{font-family:'Montserrat';font-size:.82rem;font-weight:600}
.tl-d{font-size:.58rem;color:var(--ft);margin-top:2px}

.tl-b{padding:18px 20px}
.tl-title{font-weight:600;font-size:.88rem;margin-bottom:4px}
.tl-row.brk .tl-title{color:var(--ft);font-weight:400;font-style:italic}
.tl-desc{font-size:.73rem;color:var(--dm);line-height:1.7;margin-bottom:8px;white-space:pre-line}
.tl-meta{display:flex;gap:5px;flex-wrap:wrap}
.ctag{font-size:.55rem;padding:2px 8px;border-radius:4px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.c-cam{background:rgba(68,136,255,.1);color:var(--blue);border:1px solid rgba(68,136,255,.18)}
.c-ton{background:rgba(170,102,255,.1);color:var(--purple);border:1px solid rgba(170,102,255,.18)}
.c-lgt{background:rgba(255,136,51,.1);color:var(--orange);border:1px solid rgba(255,136,51,.18)}
.c-prd{background:rgba(255,210,63,.1);color:var(--gold);border:1px solid rgba(255,210,63,.18)}
.c-ast{background:rgba(255,255,255,.04);color:var(--dm);border:1px solid var(--bd)}
.tl-note{margin-top:6px;font-size:.65rem;padding:6px 10px;background:rgba(255,210,63,.04);border:1px solid rgba(255,210,63,.1);border-radius:6px;color:var(--dm);line-height:1.5}
.tl-note b{color:var(--gold);font-weight:600}

/* ─── SHOT LIST ─── */
.scat{background:var(--sf);border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:6px}
.scat-hd{padding:11px 16px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.scat-hd:hover{background:rgba(255,255,255,.015)}
.scat.open .scat-hd{border-bottom:1px solid var(--bd)}
.scat-t{font-family:'Oswald';font-size:.8rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.scat-c{font-size:.58rem;color:var(--dm);margin-left:auto}
.scat-ch{color:var(--ft);font-size:.6rem;transition:transform .2s;margin-left:4px}
.scat.open .scat-ch{transform:rotate(90deg)}
.slist{display:none;padding:2px 0}
.scat.open .slist{display:block}
.srow{display:grid;grid-template-columns:42px 1fr 130px 90px;align-items:center;padding:8px 16px;border-bottom:1px solid rgba(255,255,255,.025);font-size:.72rem}
.srow:last-child{border-bottom:none}
.srow:hover{background:rgba(255,255,255,.012)}
.snum{font-family:'JetBrains Mono';font-size:.65rem;color:var(--ft)}
.shot-imgs{display:flex;gap:6px;padding:8px 16px 12px 58px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.025)}
.shot-img-wrap{width:120px;height:72px;border-radius:6px;border:1px solid var(--bd);overflow:hidden;position:relative;background:var(--s3)}
.shot-img-wrap img{width:100%;height:100%;object-fit:cover}
.shot-img-wrap .del-img{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;border:none;cursor:pointer;font-size:10px;display:none;align-items:center;justify-content:center}
.shot-img-wrap:hover .del-img{display:flex}
.shot-upload{width:120px;height:72px;border-radius:6px;border:1px dashed var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;background:transparent}
.shot-upload:hover{border-color:var(--gold);background:var(--goldbg)}
.shot-upload span{font-size:.55rem;color:var(--ft);margin-top:3px}
.shot-upload input{display:none}
.sname{font-weight:500}
.shot-imgs{display:flex;gap:6px;padding:8px 16px 12px 58px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.025)}
.shot-img-wrap{width:120px;height:72px;border-radius:6px;border:1px solid var(--bd);overflow:hidden;position:relative;background:var(--s3)}
.shot-img-wrap img{width:100%;height:100%;object-fit:cover}
.shot-img-wrap .del-img{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;border:none;cursor:pointer;font-size:10px;display:none;align-items:center;justify-content:center}
.shot-img-wrap:hover .del-img{display:flex}
.shot-upload{width:120px;height:72px;border-radius:6px;border:1px dashed var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;background:transparent}
.shot-upload:hover{border-color:var(--gold);background:var(--goldbg)}
.shot-upload span{font-size:.55rem;color:var(--ft);margin-top:3px}
.shot-upload input{display:none}
.eq-row{display:grid;grid-template-columns:1fr 100px;align-items:center;padding:8px 16px;border-bottom:1px solid rgba(255,255,255,.025);font-size:.72rem;cursor:pointer}
.eq-row:hover{background:rgba(255,255,255,.012)}

.stype{color:var(--dm);font-size:.62rem}

/* ─── CREW ─── */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.ccard{background:var(--sf);border:1px solid var(--bd);border-radius:9px;padding:16px 20px;position:relative;overflow:hidden}
.ccard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.ccard.cam::before{background:linear-gradient(90deg,var(--blue),transparent)}
.ccard.ton::before{background:linear-gradient(90deg,var(--purple),transparent)}
.ccard.lgt::before{background:linear-gradient(90deg,var(--orange),transparent)}
.ccard.prd::before{background:linear-gradient(90deg,var(--gold),transparent)}
.ccard.ast::before{background:linear-gradient(90deg,var(--dm),transparent)}
.crole{font-family:'Oswald';font-size:.85rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.cinp{background:transparent;border:1px solid var(--bd);border-radius:5px;padding:4px 8px;color:var(--tx);font-family:'Montserrat';font-size:.7rem;width:100%;outline:none;margin-bottom:8px}
.cinp:focus{border-color:var(--gold)}
.ctasks{font-size:.67rem;color:var(--dm);line-height:1.7}
.ctasks li{list-style:none}
.ceq{margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)}
.ceq-t{font-size:.55rem;color:var(--ft);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;font-weight:600}
.eqlist{display:flex;flex-wrap:wrap;gap:3px}
.eqtag{font-size:.55rem;padding:2px 7px;border-radius:4px;background:var(--s3);color:var(--dm);border:1px solid var(--bd)}

/* ─── CHECKS ─── */
.chgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.chgrp{background:var(--sf);border:1px solid var(--bd);border-radius:9px;padding:16px 20px}
.chgrp-t{font-family:'Oswald';font-size:.82rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.chprog{font-size:.55rem;font-family:'JetBrains Mono';color:var(--dm);font-weight:400;margin-left:auto}
.chrow{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.025);cursor:pointer;user-select:none}
.chrow:last-child{border-bottom:none}
.chbox{width:16px;height:16px;min-width:16px;border-radius:4px;border:1.5px solid var(--bd);margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:9px}
.chrow.ok .chbox{background:var(--green);border-color:var(--green);color:#050505}
.chrow.ok .chtx{color:var(--ft);text-decoration:line-through}
.chtx{font-size:.72rem;line-height:1.5}

.notes textarea{width:100%;min-height:90px;background:transparent;border:1px solid var(--bd);border-radius:8px;padding:10px;color:var(--tx);font-family:'Montserrat';font-size:.73rem;resize:vertical;outline:none;line-height:1.6}
.notes textarea:focus{border-color:var(--gold)}

/* NAV */
.nav{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--bd);padding:6px 36px;display:flex;gap:4px;flex-wrap:wrap}
.nav a{padding:6px 14px;border-radius:6px;font-size:.65rem;font-weight:600;font-family:Montserrat;color:var(--dm);text-decoration:none;border:1px solid transparent;transition:all .15s;letter-spacing:.3px}
.nav a:hover{color:var(--tx);background:var(--s2);border-color:var(--bd)}
.nav a.active{color:var(--gold);background:var(--goldbg);border-color:var(--goldb)}
@media(max-width:768px){.nav{padding:6px 16px}.nav a{padding:5px 10px;font-size:.58rem}}
@media print{.nav{display:none}}

iframe{color-scheme:light}
.etable{width:100%;border-collapse:collapse;font-size:.72rem}
.etable th{background:var(--s3);color:var(--ft);font-size:.55rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;text-align:left;border-bottom:1px solid var(--bd);position:sticky;top:0}
.etable td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.025);vertical-align:top}
.etable tr:hover{background:rgba(255,255,255,.015)}
.etable input,.etable select,.etable textarea{width:100%;background:rgba(255,210,63,.04);border:1px solid rgba(255,210,63,.12);color:var(--tx);padding:5px 8px;border-radius:4px;font-size:.7rem;font-family:Montserrat}
.etable input:focus,.etable select:focus,.etable textarea:focus{outline:none;border-color:var(--gold);background:rgba(255,210,63,.08)}
.etable textarea{resize:vertical;min-height:28px}
.etable select{appearance:none;cursor:pointer}
.etable .row-num{color:var(--ft);font-family:'JetBrains Mono';font-size:.6rem;text-align:center;width:30px}
.score-grid{display:grid;grid-template-columns:1fr repeat(5,60px);gap:1px;margin-top:12px;font-size:.65rem}
.score-grid .sg-hd{background:var(--s3);padding:6px 8px;font-weight:600;color:var(--ft);text-align:center}
.score-grid .sg-label{padding:6px 8px;color:var(--dm);border-bottom:1px solid rgba(255,255,255,.025)}
.score-grid input{width:40px;text-align:center;background:rgba(255,210,63,.04);border:1px solid rgba(255,210,63,.12);color:var(--tx);padding:4px;border-radius:4px;font-size:.65rem}
.score-grid .sg-total{background:var(--s3);padding:6px 8px;font-weight:700;color:var(--gold);text-align:center;font-size:.75rem}
.add-row-btn{display:block;width:100%;padding:8px;background:transparent;border:1px dashed var(--bd);color:var(--ft);border-radius:6px;cursor:pointer;font-size:.65rem;font-family:Montserrat;margin-top:6px;transition:all .15s}
.add-row-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--goldbg)}
.pbtn{position:fixed;bottom:20px;right:20px;padding:10px 20px;background:var(--gold);color:#050505;border:none;border-radius:9px;font-family:'Oswald';font-weight:600;font-size:.78rem;letter-spacing:1px;cursor:pointer;box-shadow:0 4px 20px rgba(255,210,63,.25);transition:all .2s;z-index:100;text-transform:uppercase}
.pbtn:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(255,210,63,.35)}

@media print{.pbtn,.lang-bar{display:none}body{background:#fff;color:#111}.hdr,.vision{background:none}.hdr{border-bottom:2px solid #111}}
@media(max-width:768px){.hdr,.vision,.main{padding-left:16px;padding-right:16px}.vis-grid{grid-template-columns:1fr}.srow{grid-template-columns:36px 1fr}.stype,.srow>span:last-child{display:none}.tl-row{grid-template-columns:72px 1fr}.ibar{flex-direction:column}}

</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <div class="logo">
      <div class="logo-ic">IC</div>
      <div><h1>ICON <b>Season Dos</b></h1><div class="sub" id="hSub"></div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="lang-bar">
        <button class="lbtn on" onclick="setLang(this,&#39;de&#39;)">DE</button>
        <button class="lbtn" onclick="setLang(this,&#39;es&#39;)">ES</button>
        <button class="lbtn" onclick="setLang(this,&#39;en&#39;)">EN</button>
      </div>
      <button class="lbtn" onclick="resetAll()" style="color:var(--red);border-color:rgba(255,68,68,.3)">RESET</button>
    </div>
  </div>
</div>

<div class="nav" id="mainNav"></div>
<div class="vision" id="visionBlock"></div>
<div class="main" id="mainContent"></div>
<button class="pbtn" onclick="window.print()" id="pBtn"></button>

var lang="de";
const L={

  positions:{de:'Positionen',es:'Posiciones',en:'Positions'},

async function loadCloudImages(){
  if(!sb)return;
  try{
    var{data}=await sb.from("icon_shot_images").select("*").order("created_at",{ascending:true});
    if(!data)return;
    shotImgs={};
    data.forEach(function(row){

    render();
  }catch(e){console.warn("Cloud load failed",e)}
}

function addShotImg(cat,si,input){
  if(!input.files||!input.files[0])return;
  var file=input.files[0];
  var k=cat+"-"+si;
  if(!shotImgs[k])shotImgs[k]=[];
  if(sb){
    // Upload to Supabase Storage
    var fname="shots/"+k+"/"+Date.now()+"_"+file.name.replace(/[^a-zA-Z0-9._-]/g,"");
    sb.storage.from(SB_BUCKET).upload(fname,file,{upsert:true}).then(function(res){
      if(res.error){console.error("Upload error",res.error);fallbackLocal(k,file);return}
      var url=SB_URL+"/storage/v1/object/public/"+SB_BUCKET+"/"+fname;
      // Save reference in DB
      sb.from("icon_shot_images").insert({shot_key:k,url:url,filename:fname}).select().single().then(function(dbRes){
        shotImgs[k].push({url:url,id:dbRes.data?dbRes.data.id:null});
        render();
      });
    });
  }else{fallbackLocal(k,file)}
}
function fallbackLocal(k,file){
  var rd=new FileReader();
  rd.onload=function(e){shotImgs[k].push({url:e.target.result,id:null});saveState();render()};
  rd.readAsDataURL(file);
}function delShotImg(cat,si,ii){var k=cat+"-"+si;if(!shotImgs[k])return;var img=shotImgs[k][ii];if(sb&&img&&img.id){sb.from("icon_shot_images").delete().eq("id",img.id).then(function(){});if(img.url&&img.url.indexOf(SB_BUCKET)>=0){var parts=img.url.split("/"+SB_BUCKET+"/");if(parts[1])sb.storage.from(SB_BUCKET).remove([parts[1]])}}shotImgs[k].splice(ii,1);saveState();render()}
